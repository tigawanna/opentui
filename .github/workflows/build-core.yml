name: Build Core

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ZIG_VERSION: 0.15.2

jobs:
  build:
    name: Build Native Libraries
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}
          cache-key: build-core-native

      - name: Install dependencies
        run: bun install

      - name: Build native libraries (cross-compile all platforms)
        run: |
          cd packages/core
          bun run build:native --all

      - name: Upload native artifacts
        uses: actions/upload-artifact@v7
        with:
          name: native-libraries
          path: packages/core/node_modules/@opentui/
          retention-days: 1

  test:
    name: Test (${{ matrix.os }})
    needs: build
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: darwin-arm64
          - os: ubuntu-latest
            platform: linux-x64
          - os: windows-latest
            platform: win32-x64
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}
          # Keep Zig's cache path on the workspace drive, but do not restore/save
          # stale .zig-cache archives on Windows; Zig 0.15.2 can fail with missing cache files.
          use-cache: ${{ runner.os != 'Windows' }}
          cache-key: build-core-test

      - name: Install dependencies
        run: bun install

      - name: Download native artifacts
        uses: actions/download-artifact@v8
        with:
          name: native-libraries
          path: packages/core/node_modules/@opentui/

      - name: Verify native library
        run: |
          echo "Checking for ${{ matrix.platform }} native library..."
          ls -la packages/core/node_modules/@opentui/
          ls -la packages/core/node_modules/@opentui/core-${{ matrix.platform }}/

      - name: Run native tests
        run: |
          cd packages/core/src/zig
          zig build test --summary all

      - name: Build TypeScript library
        run: |
          cd packages/core
          bun run build:lib

      - name: Run TypeScript tests
        run: |
          cd packages/core
          bun run test:js

  # Gate job for branch protection
  build-complete:
    name: Core - Build and Test
    needs: [test]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "Tests failed"
            exit 1
          fi
          echo "All tests passed"
