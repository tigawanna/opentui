name: Build Solid

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  bun-test:
    name: Bun Test (${{ matrix.os }})
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
          # Keep Zig's cache path on the workspace drive, but do not restore/save
          # stale .zig-cache archives on Windows; Zig 0.15.2 can fail with missing cache files.
          use-cache: ${{ runner.os != 'Windows' }}
          cache-key: build-solid

      - name: Install dependencies
        run: bun install

      - name: Build core
        working-directory: packages/core
        run: bun run build

      - name: Build
        working-directory: packages/solid
        run: bun run build --ci

      - name: Run tests
        working-directory: packages/solid
        run: bun run test

  node-source:
    name: Node Source Lane
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install dependencies
        run: bun install

      - name: Build core
        working-directory: packages/core
        run: bun run build

      - name: Build solid
        working-directory: packages/solid
        run: bun run build --ci

      - name: Run Node source lane
        working-directory: packages/solid
        run: bun run test:js:node

  packed-consumer:
    name: Packed Consumer Smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install dependencies
        run: bun install

      - name: Build core
        working-directory: packages/core
        run: bun run build

      - name: Build solid
        working-directory: packages/solid
        run: bun run build --ci

      - name: Run packed consumer smoke test
        working-directory: packages/solid
        run: bun run test:dist --skip-build

  # Gate job for branch protection
  build-complete:
    name: Solid - Build and Test
    needs: [bun-test, node-source, packed-consumer]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.bun-test.result }}" != "success" ]; then
            echo "Bun tests failed"
            exit 1
          fi
          if [ "${{ needs.node-source.result }}" != "success" ]; then
            echo "Node source lane failed"
            exit 1
          fi
          if [ "${{ needs.packed-consumer.result }}" != "success" ]; then
            echo "Packed consumer smoke test failed"
            exit 1
          fi
          echo "All tests passed"
